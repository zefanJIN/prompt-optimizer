      - 变量工作区: advanced/variables.md
      - 多消息工作区: advanced/context.md
      - 文生图工作区: image/text2image-workspace.md
      - 图生图工作区: image/image2image-workspace.md
      - 多图生图工作区: image/multiimage-workspace.md
  - 通用能力:
