# 中文专版配置（不启用 i18n，直接指向 zh 目录）
site_name: Prompt Optimizer 文档（中文）
site_url: https://docs.always200.com
site_description: Prompt Optimizer 中文文档与部署指南
site_author: linshenkx

docs_dir: docs/zh
site_dir: site

theme:
  name: material
  custom_dir: overrides
  font: false
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  features:
    - content.code.copy
    - navigation.instant
    - navigation.expand
    - navigation.tracking
    - navigation.top
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom

plugins:
  - search:
      lang:
        - zh
  - mermaid2:
      version: 10.4.0
      arguments:
        theme: auto
        themeVariables:
          fontSize: 16px
  - glightbox

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - attr_list

extra_css:
  - assets/stylesheets/brand-home.css

# 中文站点导航（直连 zh 目录）
nav:
  - 首页: index.md
  - 快速上手:
